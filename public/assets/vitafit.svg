<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
  <defs>
    <linearGradient id="vitaGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF416C" />
      <stop offset="100%" stop-color="#FF4B2B" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <rect width="500" height="500" rx="100" fill="#1A0B0E" />
  
  <!-- Sleek V shape with heartbeat/pulse -->
  <path d="M 150 180 L 250 340 L 290 220 L 350 300" fill="none" stroke="url(#vitaGrad)" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)" />
  <circle cx="150" cy="180" r="14" fill="#FF416C" />
  <circle cx="350" cy="300" r="14" fill="#FF4B2B" />
  
  <text x="50%" y="420" font-family="'Outfit', 'Inter', sans-serif" font-weight="800" font-size="64" fill="white" text-anchor="middle" letter-spacing="4">VITA FIT</text>
</svg>
