<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
  <defs>
    <linearGradient id="gymGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#60A5FA" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <rect width="500" height="500" rx="100" fill="#0F172A" />
  
  <!-- Dumbbell shape -->
  <g fill="url(#gymGrad)" filter="url(#glow)">
    <rect x="130" y="235" width="240" height="30" rx="15" />
    <rect x="150" y="180" width="40" height="140" rx="20" />
    <rect x="110" y="150" width="40" height="200" rx="20" />
    <rect x="310" y="180" width="40" height="140" rx="20" />
    <rect x="350" y="150" width="40" height="200" rx="20" />
  </g>
  
  <text x="50%" y="420" font-family="'Outfit', 'Inter', sans-serif" font-weight="800" font-size="56" fill="white" text-anchor="middle" letter-spacing="2">GYMBUDDY</text>
</svg>
