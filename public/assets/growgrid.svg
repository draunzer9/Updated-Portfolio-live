<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
  <defs>
    <linearGradient id="growGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00C9FF" />
      <stop offset="100%" stop-color="#92FE9D" />
    </linearGradient>
    <filter id="neon" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <rect width="500" height="500" rx="100" fill="#0A1916" />
  
  <!-- Abstract Node Grid forming a G / Arrow -->
  <g transform="translate(130, 120)">
    <circle cx="40" cy="40" r="14" fill="url(#growGrad)" />
    <circle cx="120" cy="40" r="14" fill="url(#growGrad)" />
    <circle cx="200" cy="40" r="14" fill="url(#growGrad)" />
    
    <circle cx="40" cy="120" r="14" fill="url(#growGrad)" />
    <circle cx="120" cy="120" r="14" fill="url(#growGrad)" />
    <circle cx="200" cy="120" r="14" fill="url(#growGrad)" />
    
    <circle cx="40" cy="200" r="14" fill="url(#growGrad)" />
    <circle cx="120" cy="200" r="14" fill="url(#growGrad)" />
    <circle cx="200" cy="200" r="14" fill="url(#growGrad)" />
    
    <!-- Connecting lines -->
    <path d="M 40 40 L 200 40 L 200 120 L 120 120 L 120 200 L 40 200 Z" fill="none" stroke="url(#growGrad)" stroke-width="12" stroke-linejoin="round" filter="url(#neon)" />
  </g>
  
  <text x="50%" y="420" font-family="'Outfit', 'Inter', sans-serif" font-weight="800" font-size="56" fill="white" text-anchor="middle" letter-spacing="2">GROWGRID</text>
</svg>
